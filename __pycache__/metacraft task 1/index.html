<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maincrafts Technology - Internship Task 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Welcome to My Landing Page</h1>
        <p>This is my first full-stack project connecting HTML to Spring Boot.</p>
    </header>

    <!-- Main Content & Form -->
    <main class="container">
        <div class="form-card">
            <h2>Contact Us</h2>
            <form action="/api/submit" method="POST">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" rows="4" placeholder="Type your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Form</button>
            </form>
        </div>
    </main>

</body>
</html>
